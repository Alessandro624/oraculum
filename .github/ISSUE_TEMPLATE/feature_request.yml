name: Feature Request
description: Propose a new provider, visitor, prayer, or other improvement.
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping make oraculum slightly less theoretically indefensible.
        Please describe what you have in mind.

  - type: dropdown
    id: type
    attributes:
      label: Type of feature
      options:
        - New provider
        - New AST visitor
        - New prayer invocations
        - API change
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What do you want to add or change, and why?
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Example usage
      description: >
        If applicable, show what the feature would look like in code.
        A few lines is enough.
      render: python
    validations:
      required: false

  - type: dropdown
    id: pr
    attributes:
      label: Are you willing to open a pull request?
      options:
        - "Yes"
        - "No"
        - "Maybe, if someone points me in the right direction"
    validations:
      required: true
